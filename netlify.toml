[build]
  command = "echo 'Building...'"
  publish = "frontend"
  functions = "netlify/functions"

[functions]
  node_bundle = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/docs"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/redoc"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/openapi.json"
  to = "/.netlify/functions/api"
  status = 200

# UI Route Mappings (Static)
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200

[[redirects]]
